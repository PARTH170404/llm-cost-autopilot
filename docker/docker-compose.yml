version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: autopilot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: autopilot-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: autopilot-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped
    command: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501

  # One-shot container to pull models into Ollama
  model-puller:
    image: ollama/ollama:latest
    container_name: autopilot-model-puller
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        ollama pull phi3 &&
        ollama pull mistral &&
        ollama pull llama3 &&
        echo 'All models pulled!'
      "
    restart: "no"

volumes:
  ollama_data:
